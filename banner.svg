<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 200" width="840" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="bannerClip">
      <rect x="0" y="0" width="840" height="200" rx="16"/>
    </clipPath>
  </defs>

  <!-- Banner background -->
  <rect x="0" y="0" width="840" height="200" rx="16" fill="url(#bg)"/>

  <!-- Subtle glow behind icon -->
  <ellipse cx="100" cy="90" rx="70" ry="80" fill="url(#glow)" clip-path="url(#bannerClip)"/>

  <!-- Icon — scaled-down version of logo.svg funnel -->
  <g transform="translate(40, 20) scale(0.32)">
    <!-- Funnel shape -->
    <path d="M 128,148 L 384,148 L 384,164 L 288,272 L 288,364 L 224,388 L 224,272 L 128,164 Z"
          fill="none" stroke="url(#accent)" stroke-width="14" stroke-linejoin="round" stroke-linecap="round"/>

    <!-- Sieve mesh -->
    <line x1="168" y1="192" x2="344" y2="192" stroke="#818cf8" stroke-width="7" stroke-linecap="round" opacity="0.5"/>
    <line x1="196" y1="220" x2="316" y2="220" stroke="#818cf8" stroke-width="7" stroke-linecap="round" opacity="0.4"/>
    <line x1="218" y1="248" x2="294" y2="248" stroke="#818cf8" stroke-width="7" stroke-linecap="round" opacity="0.3"/>

    <!-- Output dot -->
    <circle cx="256" cy="420" r="12" fill="#818cf8" opacity="0.8"/>
  </g>

  <!-- Wordmark -->
  <text x="200" y="98" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace"
        font-size="56" font-weight="700" letter-spacing="-2">
    <tspan fill="#e2e8f0">CVE</tspan><tspan fill="url(#accent)">sieve</tspan>
  </text>

  <!-- Tagline -->
  <text x="202" y="128" font-family="'Inter', 'SF Pro Display', -apple-system, Helvetica, Arial, sans-serif"
        font-size="16" fill="#64748b" letter-spacing="0.5">
    Filter CVE scanner noise with real-world exploitability signals
  </text>

  <!-- Tier badges -->
  <g transform="translate(202, 148)">
    <!-- BLOCK badge -->
    <rect x="0" y="0" width="64" height="24" rx="6" fill="#ef4444" opacity="0.15"/>
    <text x="32" y="16" text-anchor="middle" font-family="'SF Mono', monospace" font-size="11" font-weight="600" fill="#ef4444">BLOCK</text>

    <!-- WARN badge -->
    <rect x="76" y="0" width="58" height="24" rx="6" fill="#f59e0b" opacity="0.15"/>
    <text x="105" y="16" text-anchor="middle" font-family="'SF Mono', monospace" font-size="11" font-weight="600" fill="#f59e0b">WARN</text>

    <!-- SUPPRESS badge -->
    <rect x="146" y="0" width="86" height="24" rx="6" fill="#22c55e" opacity="0.15"/>
    <text x="189" y="16" text-anchor="middle" font-family="'SF Mono', monospace" font-size="11" font-weight="600" fill="#22c55e">SUPPRESS</text>
  </g>
</svg>